<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - 公开展示</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        :root {
            --bg: #fdfdfd; --surface: #ffffff; --text: #1e293b; 
            --text-muted: #64748b; --border: #e2e8f0; --primary: #3b82f6;
        }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; padding: 40px 20px; display: flex; justify-content: center;
        }
        .container { width: 100%; max-width: 850px; }
        .header { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header h1 { margin: 0; font-size: 32px; font-weight: 600; color: #000; }
        .meta { font-size: 14px; color: var(--text-muted); margin-top: 8px; }
        .content { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px; 
            padding: 40px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
            line-height: 1.8; font-size: 16px; min-height: 600px;
        }
        /* Markdown Styling */
        .content h1, .content h2, .content h3 { border-bottom: 1px solid #eee; padding-bottom: 8px; margin-top: 24px; }
        .content pre { background: #f6f8fa; padding: 16px; border-radius: 8px; overflow-x: auto; }
        .content code { font-family: 'JetBrains Mono', monospace; background: #f1f5f9; padding: 2px 4px; border-radius: 4px; font-size: 0.9em; }
        .content blockquote { border-left: 4px solid var(--primary); padding-left: 16px; color: var(--text-muted); font-style: italic; margin: 20px 0; }
        .content img { max-width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ title }}</h1>
            <div class="meta">由 @{{ username }} 分享 · 只读模式</div>
        </div>
        <article class="content" id="content">
            <!-- Rendered Markdown -->
        </article>
    </div>

    <script>
        const rawContent = `{{ content | safe }}`;
        const contentEl = document.getElementById('content');
        
        // Setup marked
        contentEl.innerHTML = marked.parse(rawContent);
        
        // Render Math
        renderMathInElement(contentEl, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false},
                {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError : false
        });
    </script>
</body>
</html>
