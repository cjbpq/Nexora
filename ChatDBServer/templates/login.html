<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - ChatDB</title>
    <style>
        :root {
            --bg-left: #000000;
            --bg-right: #ffffff;
            --accent: #2c2c2c;
            --text-main: #1a1a1a;
            --text-light: #666666;
            --border: #eeeeee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-right);
            min-height: 100vh;
            overflow: hidden;
        }

        .login-wrapper {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* --- LEFT PANEL: Animation --- */
        .login-left {
            flex: 1.3;
            background: var(--bg-left);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .login-left::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 70%);
            opacity: 0.5;
        }

        .big-logo {
            font-size: 84px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -4px;
            display: flex;
            align-items: baseline;
            z-index: 10;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeInLogo 1.2s ease-out;
        }

        @keyframes fadeInLogo {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .big-logo .dot {
            color: #444;
            margin-left: 4px;
        }

        .big-logo .dot::after {
            content: ".";
            animation: multiPhaseDots 4.5s infinite;
            display: inline-block;
        }

        @keyframes multiPhaseDots {
            0%   { content: "."; opacity: 1; }
            5%   { content: "."; opacity: 0; }
            10%  { content: "."; opacity: 1; }
            15%  { content: "."; opacity: 0; }
            20%  { content: "."; opacity: 1; }
            22%  { content: "."; opacity: 1; }
            33%  { content: ".."; opacity: 1; }
            44%  { content: "..."; opacity: 1; }
            55%  { content: "...?"; opacity: 1; }
            77%  { content: "...?"; opacity: 1; }
            80%  { content: ".."; opacity: 1; }
            85%  { content: "."; opacity: 1; }
            90%  { content: ""; opacity: 1; }
            100% { content: "."; opacity: 1; }
        }

        /* --- RIGHT PANEL: Form --- */
        .login-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: #fff;
        }

        .login-box {
            width: 100%;
            max-width: 380px;
            animation: slideInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .login-header {
            margin-bottom: 40px;
        }

        .login-header h2 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-light);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-main);
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 15px;
            background: #fafafa;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #000;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0,0,0,0.03);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            background: #222;
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .error-message {
            background: #fff2f2;
            color: #d00;
            padding: 14px;
            border-radius: 4px;
            border-left: 4px solid #d00;
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .loading {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Mobile specific */
        @media (max-width: 768px) {
            .login-left { display: none; }
            .login-right { flex: 1; }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-left">
            <div class="big-logo">ChatDB<span class="dot"></span></div>
        </div>
        
        <div class="login-right">
            <div class="login-box">
                <div class="login-header">
                    <h2>欢迎回来</h2>
                    <p>请登录您的 ChatDB 账户以继续</p>
                </div>

                <div class="error-message" id="errorMessage"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" name="username" placeholder="输入您的用户名" required autocomplete="username">
                    </div>

                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" placeholder="输入您的密码" required autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn-login" id="loginBtn">
                        <span id="btnText">登 录</span>
                        <div class="loading" id="loading" style="display: none;"></div>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const loading = document.getElementById('loading');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }

            // 显示加载状态
            loginBtn.disabled = true;
            btnText.style.display = 'none';
            loading.style.display = 'inline-block';
            errorMessage.classList.remove('show');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = '/chat';
                } else {
                    showError(data.message || '登录失败');
                    resetButton();
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
                resetButton();
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        function resetButton() {
            loginBtn.disabled = false;
            btnText.style.display = 'inline';
            loading.style.display = 'none';
        }

        // 回车快捷登录
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
