<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库 - Knowa</title>
    <link rel="stylesheet" href="/static/css/knowledge.css">
</head>
<body>
    <div class="container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-left">
                <h1>📚 知识库管理</h1>
            </div>
            <div class="header-right">
                <button class="btn-back" onclick="window.location.href='/chat'">
                    ← 返回聊天
                </button>
                <span class="username">{{ username }}</span>
                <button class="btn-logout" onclick="window.location.href='/logout'">登出</button>
            </div>
        </header>

        <!-- 主内容区 -->
        <div class="main">
            <!-- 标签页 -->
            <div class="tabs">
                <button class="tab-btn active" id="basisTabBtn" data-tab="basis">基础知识库</button>
                <button class="tab-btn" id="shortTabBtn" data-tab="short">短期记忆</button>
            </div>

            <!-- 基础知识库标签页 -->
            <div class="tab-content active" id="basisContent">
                <div class="section-header">
                    <h2>基础知识库</h2>
                    <button class="btn-add" id="addBasisBtn">+ 添加知识</button>
                </div>

                <div class="knowledge-grid" id="basisGrid">
                    <!-- 基础知识列表 -->
                </div>
            </div>

            <!-- 短期记忆标签页 -->
            <div class="tab-content" id="shortContent">
                <div class="section-header">
                    <h2>短期记忆</h2>
                    <button class="btn-add" id="addShortBtn">+ 添加记忆</button>
                </div>

                <div class="knowledge-list" id="shortList">
                    <!-- 短期记忆列表 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑基础知识模态框 -->
    <div class="modal" id="addBasisModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="basisModalTitle">添加基础知识</h3>
                <button class="btn-close" onclick="closeAllModals()">×</button>
            </div>
            <div class="modal-body">
                <form id="basisForm">
                    <div class="form-group">
                        <label>标题</label>
                        <input type="text" id="basisTitle" name="title" placeholder="输入知识标题" required>
                    </div>
                    <div class="form-group">
                        <label>内容 (支持协作编辑)</label>
                        <textarea id="basisContent" name="content" placeholder="输入知识内容" rows="10" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>来源URL（可选）</label>
                        <input type="text" id="basisUrl" name="url" placeholder="https://...">
                    </div>
                    <div id="shareInfo" style="margin-bottom:15px; display:none; padding:10px; background:#f0f9ff; border:1px solid #bae6fd; border-radius:8px; font-size:13px;">
                        <strong>公开分享预览:</strong> <a id="shareLink" href="#" target="_blank" style="color:#0284c7;">点击访问</a>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn" id="toggleShareBtn" style="background:#f1f5f9; color:#475569;">开启/关闭公开协作</button>
                        <button type="button" class="btn-cancel cancel-btn" onclick="closeAllModals()">取消</button>
                        <button type="submit" class="btn-submit" id="basisSubmitBtn">添加</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 查看基础知识模态框 -->
    <div class="modal" id="viewModal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 id="viewTitle"></h3>
                <button class="btn-close close-btn">×</button>
            </div>
            <div class="modal-body">
                <div class="content-viewer" id="viewContent"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel cancel-btn">关闭</button>
            </div>
        </div>
    </div>

    <!-- 添加短期记忆模态框 -->
    <div class="modal" id="addShortModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="shortModalTitle">添加短期记忆</h3>
                <button class="btn-close close-btn">×</button>
            </div>
            <div class="modal-body">
                <form id="shortForm">
                    <div class="form-group">
                        <label>标题</label>
                        <input type="text" id="shortTitle" name="title" placeholder="输入记忆标题" required>
                    </div>
                    <div class="form-group">
                        <label>内容</label>
                        <textarea id="shortContent" name="content" placeholder="输入记忆内容" rows="5" required></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-cancel cancel-btn">取消</button>
                        <button type="submit" class="btn-submit" id="shortSubmitBtn">添加</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/js/knowledge.js"></script>
</body>
</html>
