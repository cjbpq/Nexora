<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - 公开知识点</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #fdfdfd; --surface: #ffffff; --text: #1e293b; 
            --text-muted: #64748b; --border: #e2e8f0; --primary: #3b82f6;
        }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; padding: 40px 20px; display: flex; justify-content: center;
        }
        .container { width: 100%; max-width: 800px; }
        .header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header h1 { margin: 0; font-size: 28px; font-weight: 600; }
        .meta { font-size: 14px; color: var(--text-muted); }
        .editor-container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; }
        #editor { width: 100%; min-height: 500px; border: none; padding: 24px; font-size: 16px; line-height: 1.6; resize: vertical; outline: none; display: block; font-family: inherit; }
        .status-bar { padding: 10px 20px; background: #f8fafc; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-muted); }
        .badge { padding: 2px 8px; border-radius: 4px; background: #dcfce7; color: #166534; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>{{ title }}</h1>
                <div class="meta">由 @{{ username }} 分享 · 目前处于多人协作模式</div>
            </div>
            <div id="saveStatus"><span class="badge">已同步</span></div>
        </div>
        <div class="editor-container">
            <textarea id="editor" placeholder="开始编写内容...">{{ content }}</textarea>
            <div class="status-bar">
                <span>提示：内容将自动保存。由于是实时协作，建议避免大块删除。</span>
                <span id="charCount">0 字符</span>
            </div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const saveStatus = document.getElementById('saveStatus');
        const charCount = document.getElementById('charCount');
        let timer = null;

        function updateCharCount() {
            charCount.innerText = editor.value.length + ' 字符';
        }

        async function saveData() {
            saveStatus.innerHTML = '<span class="badge" style="background:#fef9c3;color:#854d0e">同步中...</span>';
            try {
                const res = await fetch(window.location.pathname.replace('/public/', '/api/public/'), {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: editor.value })
                });
                const data = await res.json();
                if (data.success) {
                    saveStatus.innerHTML = '<span class="badge">已同步</span>';
                } else {
                    saveStatus.innerHTML = '<span class="badge" style="background:#fee2e2;color:#991b1b">同步失败</span>';
                }
            } catch (e) {
                saveStatus.innerHTML = '<span class="badge" style="background:#fee2e2;color:#991b1b">离线</span>';
            }
        }

        editor.oninput = () => {
            updateCharCount();
            if (timer) clearTimeout(timer);
            timer = setTimeout(saveData, 1000); // 1秒无输入后自动保存
        };

        // 初始字数
        updateCharCount();

        // 简易定时刷新以支持他人的修改（最简单的“协作”）
        setInterval(async () => {
            if (document.activeElement === editor) return; // 正在输入时不刷新，防止光标丢失
            try {
                const res = await fetch(window.location.pathname.replace('/public/', '/api/public/'));
                const data = await res.json();
                if (data.success && data.content !== editor.value) {
                    editor.value = data.content;
                    updateCharCount();
                }
            } catch (e) {}
        }, 5000);
    </script>
</body>
</html>
