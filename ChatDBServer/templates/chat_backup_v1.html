<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatDB - 智能对话</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="/static/css/chat.css?v=2">
    <link rel="stylesheet" href="/static/css/token_modal.css?v=2">
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 id="sidebarTitle">💬 对话历史</h2>
            <button class="btn-new-chat" id="newChatBtn">+ 新对话</button>
        </div>
        
        <!-- 对话列表 -->
        <div class="conversation-list" id="conversationList">
            <!-- 对话列表动态加载 -->
        </div>

        <div class="sidebar-footer">
            <button class="btn-knowledge-graph" onclick="window.location.href='/knowledge_graph'" title="知识图谱">
                🧠 知识图谱
            </button>
            <button class="btn-knowledge-graph" onclick="window.location.href='/token_logs'" title="Token统计" style="margin-top: 5px;">
                📊 Token统计
            </button>
            <div>
                <span class="username-display">{{ username }}</span>
                <button class="btn-logout" onclick="window.location.href='/logout'">
                    🚪 登出
                </button>
            </div>
        </div>
    </div>

    <!-- 主聊天区域 -->
    <div class="main-content">
        <!-- 顶部栏 -->
        <div class="top-bar">
            <div class="top-bar-left">
                <button class="btn-toggle-sidebar" id="toggleSidebar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="model-select-container">
                    <select id="modelSelector" class="model-selector" title="选择模型">
                        <option value="" disabled selected>加载模型中...</option>
                    </select>
                </div>
            </div>
            
            <h3 class="conversation-title" id="conversationTitle">新对话</h3>
            
            <div class="top-bar-right">
                <button class="btn-icon" id="toggleKnowledgePanel" title="知识库面板">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                </button>
            </div>
        </div>

        <!-- 消息区域 -->
        <div class="messages-container" id="messagesContainer">
            <div class="welcome-message">
                <h1>👋 你好，{{ username }}！</h1>
                <p>我是你的AI助手，有什么可以帮助你的吗？</p>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <!-- 选项开关 -->
            <div class="chat-options">
                <label class="option-item">
                    <input type="checkbox" id="enableThinking" />
                    <span class="option-label">深度思考</span>
                </label>
                <label class="option-item">
                    <input type="checkbox" id="enableWebSearch" checked />
                    <span class="option-label">联网搜索</span>
                </label>
                <label class="option-item">
                    <input type="checkbox" id="enableTools" checked />
                    <span class="option-label">工具调用</span>
                </label>
            </div>
            
            <div class="input-wrapper">
                <textarea 
                    id="messageInput" 
                    class="message-input"
                    placeholder="输入消息... (Shift+Enter 换行，Enter 发送)"
                    rows="1"
                ></textarea>
                <button class="btn-send" id="sendBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            
            <div class="token-display-mini" style="text-align: center; margin-top: 8px; font-size: 11px; color: #94a3b8;">
                <span id="tokenDisplay">Input: <span id="totalInputTokens">0</span> | Output: <span id="totalOutputTokens">0</span></span>
            </div>
        </div>
    </div>

    <!-- 右侧知识库面板 -->
    <div class="knowledge-panel visible" id="knowledgePanel">
        <div class="knowledge-panel-header">
            <h3>📚 知识库</h3>
            <div class="knowledge-panel-actions">
                <button class="btn-refresh-knowledge" id="refreshKnowledgeBtn" title="刷新知识库">🔄</button>
                <button class="btn-toggle-panel" id="btnTogglePanel" title="收起面板">◀</button>
            </div>
        </div>
        <div class="knowledge-panel-content">
            <div class="knowledge-category expanded">
                <div class="category-header" data-category="basis">
                    <span class="category-icon">📖</span>
                    <span class="category-name">基础知识</span>
                    <span class="category-count" id="panelBasisCount">0</span>
                </div>
                <div class="knowledge-items" id="panelBasisKnowledgeList">
                    <!-- 基础知识列表 -->
                </div>
            </div>
            <div class="knowledge-category expanded">
                <div class="category-header" data-category="short">
                    <span class="category-icon">💭</span>
                    <span class="category-name">短期记忆</span>
                    <span class="category-count" id="panelShortCount">0</span>
                </div>
                <div class="knowledge-items" id="panelShortMemoryList">
                    <!-- 短期记忆列表 -->
                </div>
            </div>
        </div>
        <div class="knowledge-panel-footer">
            <button class="btn-goto-graph" onclick="window.location.href='/knowledge_graph'">
                🧠 转到图谱
            </button>
        </div>
    </div>

    <!-- Token 详情模态窗口 -->
    <div class="modal-overlay" id="tokenModal">
        <div class="modal-container">
            <div class="modal-header">
                <div class="modal-title">
                    <span>📊 Token 使用详情</span>
                </div>
                <button class="modal-close" id="closeModalBtn">×</button>
            </div>
            <div class="modal-body">
                <div class="modal-stats">
                    <div class="stat-card">
                        <div class="stat-label">总消耗</div>
                        <div class="stat-value" id="modalTotalTokens">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">今日消耗</div>
                        <div class="stat-value" id="modalTodayTokens">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">对话轮数</div>
                        <div class="stat-value" id="modalTotalRounds">0</div>
                    </div>
                </div>
                
                <div class="modal-table-container">
                    <table class="modal-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>对话/ID</th>
                                <th>动作</th>
                                <th>Input</th>
                                <th>Output</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="modalLogsBody">
                            <tr>
                                <td colspan="6" style="text-align: center;">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/token_modal.js"></script>
    <script src="/static/js/chat.js"></script>
</body>
</html>
