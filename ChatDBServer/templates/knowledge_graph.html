<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Hub - Knowa</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/knowledge_graph_div.css">
    <style>
        :root {
            --primary: #3b82f6; --bg: #fdfdfd; --surface: #ffffff;
            --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0;
            --sidebar-width: 400px; --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text); overflow: hidden;
        }
        .layout { display: flex; height: 100vh; width: 100vw; position: relative; }
        .canvas-area { flex: 1; position: relative; background-color: var(--bg); }
        .top-bar {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; gap: 16px; align-items: center; z-index: 100; pointer-events: none;
        }
        .top-bar > * { pointer-events: auto; }
        .search-container {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 0 15px; display: flex; align-items: center;
            box-shadow: var(--shadow); width: 300px; height: 44px;
        }
        .search-container input { border: none; outline: none; margin-left: 10px; width: 100%; font-size: 14px; background: transparent; }
        .btn-group { display: flex; gap: 8px; }
        .btn {
            background: var(--surface); border: 1px solid var(--border); height: 44px;
            padding: 0 16px; border-radius: 12px; cursor: pointer; font-size: 13px; 
            font-weight: 500; display: flex; align-items: center; gap: 8px;
            box-shadow: var(--shadow); color: var(--text-muted);
        }
        .btn:hover { background: #f8fafc; color: var(--text); }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .inspector {
            width: var(--sidebar-width); background: #fff; border-left: 1px solid var(--border); 
            display: flex; flex-direction: column; transform: translateX(100%); 
            transition: transform 0.3s ease; position: absolute; right: 0; top: 0; bottom: 0; z-index: 500;
            box-shadow: -10px 0 30px rgba(0,0,0,0.05);
        }
        .inspector.open { transform: translateX(0); }
        .inspector-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .inspector-body { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .editor-container textarea { width: 100%; height: 350px; border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 14px; resize: none; margin-bottom: 16px; }
        .zoom-controls { position: absolute; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        .btn-icon { width: 40px; height: 40px; justify-content: center; padding: 0; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.7); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .loading-spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 3000; }
    </style>
    <script src="/static/js/knowledge_node_graph.js"></script>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>
    <div class="layout">
        <div class="canvas-area">
            <div id="graph-container" class="graph-container"></div>
            <div class="top-bar">
                <div class="search-container"><i class="fa-solid fa-search"></i><input type="text" id="searchNodes" placeholder="搜索并定位知识点..."></div>
                <div class="btn-group">
                    <button class="btn" id="aiOrganize"><i class="fa-solid fa-wand-magic-sparkles"></i> AI 整理</button>
                    <button class="btn" id="aiScan"><i class="fa-solid fa-link"></i> 脉络重构</button>
                    <button class="btn" onclick="window.location.href='/'"><i class="fa-solid fa-house"></i></button>
                </div>
            </div>
            <div class="zoom-controls">
                <button class="btn btn-icon" id="zoomIn"><i class="fa-solid fa-plus"></i></button>
                <button class="btn btn-icon" id="zoomOut"><i class="fa-solid fa-minus"></i></button>
                <button class="btn btn-icon" id="fitView"><i class="fa-solid fa-expand"></i></button>
            </div>
        </div>
        <aside class="inspector" id="inspector">
            <div class="inspector-header"><h2 id="nodeTitle">详情</h2><button class="btn btn-icon" id="closeInspector" style="border:none;background:transparent;"><i class="fa-solid fa-xmark"></i></button></div>
            <div class="inspector-body">
                <div class="editor-container"><textarea id="nodeContent" placeholder="编辑内容..."></textarea>
                    <div style="display:flex; flex-direction:column; gap:8px;">
                        <button class="btn btn-primary" id="saveNode" style="width:100%">保存修改</button>
                        <div style="display:flex; gap:8px;">
                            <button class="btn" id="shareNode" style="flex:1"><i class="fa-solid fa-share-nodes"></i> 分享</button>
                            <button class="btn" id="deleteNode" style="flex:1; color:#ef4444">删除</button>
                        </div>
                        <div id="shareLinkContainer" style="display:none; margin-top:10px; font-size:12px; border:1px dashed var(--border); padding:8px; border-radius:8px; background:#f8fafc;">
                            <label style="color:var(--text-muted)">公开访问地址:</label>
                            <div style="display:flex; gap:5px; margin-top:5px;">
                                <input type="text" id="shareUrlInput" readonly style="flex:1; border:1px solid var(--border); border-radius:4px; padding:2px 5px; font-size:11px;">
                                <button class="btn" onclick="copyShareUrl()" style="height:auto; padding:2px 8px; font-size:11px;">复制</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </div>
    <script>
        let graph;
        let currentNoteTitle = null;
        document.addEventListener('DOMContentLoaded', () => { initGraph(); setupEvents(); loadData(); });
        function initGraph() { graph = new NodeGraph('graph-container'); }
        async function loadData(silent = false) {
            try { if (!silent) toggleLoading(true);
                const res = await fetch('/api/knowledge/graph');
                const data = await res.json();
                if (data.success) graph.setData(data.categories, data.connections);
            } finally { if (!silent) toggleLoading(false); }
        }
        async function showNote(title) {
            currentNoteTitle = title;
            document.getElementById('nodeTitle').innerText = title;
            document.getElementById('shareLinkContainer').style.display = 'none';
            try {
                const res = await fetch(`/api/knowledge/basis/` + encodeURIComponent(title));
                const data = await res.json();
                document.getElementById('nodeContent').value = data.knowledge.content;
                document.getElementById('inspector').classList.add('open');
            } catch (e) { showToast('加载失败'); }
        }
        function hideInspector() { document.getElementById('inspector').classList.remove('open'); }
        function copyShareUrl() {
            const input = document.getElementById('shareUrlInput');
            input.select();
            document.execCommand('copy');
            showToast('链接已复制到剪贴板');
        }
        function setupEvents() {
            document.getElementById('closeInspector').onclick = hideInspector;
            document.getElementById('shareNode').onclick = async () => {
                const res = await fetch(`/api/knowledge/basis/` + encodeURIComponent(currentNoteTitle) + `/share`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ public: true })
                });
                const data = await res.json();
                if(data.success) {
                    document.getElementById('shareLinkContainer').style.display = 'block';
                    document.getElementById('shareUrlInput').value = data.share_url;
                    showToast('已开启公开分享');
                }
            };
            document.getElementById('saveNode').onclick = async () => {
                const content = document.getElementById('nodeContent').value;
                const res = await fetch(`/api/knowledge/basis/` + encodeURIComponent(currentNoteTitle), {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, title: currentNoteTitle })
                });
                const data = await res.json();
                if(data.success) { showToast('已保存'); loadData(true); }
            };
            document.getElementById('deleteNode').onclick = async () => {
                if(!confirm('确定删除吗？')) return;
                const res = await fetch(`/api/knowledge/basis/` + encodeURIComponent(currentNoteTitle), { method: 'DELETE' });
                const data = await res.json();
                if(data.success) { showToast('已删除'); hideInspector(); loadData(true); }
            };
            document.getElementById('searchNodes').oninput = (e) => {
                const q = e.target.value.toLowerCase();
                const items = document.querySelectorAll('.knowledge-item');
                items.forEach(item => {
                    if (q && item.innerText.toLowerCase().includes(q)) {
                        item.style.background = '#fbbf24'; item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else { item.style.background = ''; }
                });
            };
            document.getElementById('zoomIn').onclick = () => { graph.transform.k *= 1.2; graph.updateTransform(); };
            document.getElementById('zoomOut').onclick = () => { graph.transform.k *= 0.8; graph.updateTransform(); };
            document.getElementById('fitView').onclick = () => { graph.transform = {x:0,y:0,k:1}; graph.updateTransform(); };
            document.getElementById('aiScan').onclick = async () => { showToast('扫描中...'); toggleLoading(true); await fetch(`/api/knowledge/ai/scan`, { method: 'POST' }); await loadData(true); toggleLoading(false); };
            document.getElementById('aiOrganize').onclick = async () => { if(!confirm('AI 整理将重置分类，是否继续？')) return; showToast('AI 整理中...'); toggleLoading(true); await fetch(`/api/knowledge/ai/organize`, { method: 'POST' }); await loadData(true); toggleLoading(false); };
        }
        function toggleLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }
        function showToast(msg) {
            const toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = msg;
            document.body.appendChild(toast); setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
</html>
