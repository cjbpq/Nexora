<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatDB Pro</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- LaTeX & Highlight -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>

    <!-- App Styles -->
    <link rel="stylesheet" href="/static/css/style.css?v=20260204"> 
    <link rel="stylesheet" href="/static/css/easymde_override.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar: Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">ChatDB<span class="dot">.</span></div>
                <button class="btn-icon" id="toggleSidebarMobile" style="display:none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <div class="sidebar-action">
                <button id="newChatBtn" class="btn-primary-outline full-width">
                    <span class="icon">+</span> New Chat
                </button>
            </div>

            <div class="sidebar-content" id="conversationList">
                <!-- Dynamic List -->
            </div>

            <div class="sidebar-footer">
                <a href="/knowledge_graph" class="footer-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                    <span>Knowledge Graph</span>
                </a>
                <div class="user-profile">
                    <div class="avatar">{{ username[0] | upper }}</div>
                    <div class="username" title="{{ username }}">{{ username }}</div>
                    <button class="btn-logout" onclick="window.location.href='/logout'" title="Logout">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
            </div>
        </nav>

        <!-- Main Chat Area -->
        <main class="main-content">
            <!-- Header -->
            <header class="chat-header">
                <div class="header-left">
                    <button class="btn-icon" id="toggleSidebar" title="Toggle Sidebar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                    </button>
                    <!-- Custom Select Container -->
                    <div class="custom-select-container" id="modelSelectContainer">
                        <div class="select-selected" id="currentModelDisplay">Select Model</div>
                        <div class="select-items select-hide" id="modelOptions">
                            <!-- Options Injected via JS -->
                        </div>
                    </div>
                </div>
                
                <div class="header-center" id="conversationTitle">
                    Untitled Conversation
                </div>

                <div class="header-right">
                   <button class="btn-icon" id="toggleKnowledgePanel" title="Knowledge Base">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                    </button>
                </div>
            </header>

            <!-- Messages -->
            <div id="messagesContainer" class="messages-area">
                <div class="welcome-screen">
                    <h1>Hello, {{ username }}.</h1>
                    <p>How can I assist you today?</p>
                </div>
            </div>

            <!-- Knowledge Viewer -->
            <div id="knowledgeViewer" style="display:none; flex:1; overflow: hidden; height: calc(100vh - 60px);">
                <textarea id="knowledgeEditor"></textarea>
            </div>

            <!-- Input Area -->
            <div id="inputWrapper" class="input-wrapper">
                <div class="input-container">
                    <div class="input-options">
                        <label class="btn-icon-small" title="Upload File" style="cursor: pointer; display: inline-flex; align-items: center; justify-content: center; margin-right: 8px; color: var(--text-secondary);">
                            <input type="file" id="fileInput" style="display:none" multiple>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                        </label>
                        <label class="check-box" title="Deep Thinking">
                            <input type="checkbox" id="enableThinking">
                            <span class="check-label">Thinking</span>
                        </label>
                        <label class="check-box" title="Web Search">
                            <input type="checkbox" id="enableWebSearch" checked>
                            <span class="check-label">Search</span>
                        </label>
                        <label class="check-box" title="Tool Use">
                            <input type="checkbox" id="enableTools" checked>
                            <span class="check-label">Tools</span>
                        </label>
                    </div>
                    
                    <div id="filePreviewArea" class="file-preview-area" style="display:none; padding: 4px 8px; gap: 8px; flex-wrap: wrap; background: rgba(0,0,0,0.02); border-bottom: 1px solid var(--border-color);"></div>

                    <textarea id="messageInput" placeholder="Type a message..." rows="1"></textarea>
                    
                    <div class="input-footer">
                        <div class="token-mini" id="tokenDisplay">
                            TK <span id="totalInputTokens">0</span> / <span id="totalOutputTokens">0</span>
                        </div>
                        <button id="sendBtn" class="btn-send">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Knowledge Panel (Right Sidebar) -->
        <aside class="knowledge-sidebar" id="knowledgePanel">
            <div class="k-header">
                <h3>Knowledge</h3>
                <div class="k-actions">
                    <button class="btn-icon-small" id="refreshKnowledgeBtn" title="Refresh">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    </button>
                    <button class="btn-icon-small" id="btnTogglePanel" title="Close">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>
            
            <div class="k-content">
                <div class="k-section">
                    <div class="k-section-title">
                        BASIS <span class="badge" id="panelBasisCount">0</span>
                    </div>
                    <div id="panelBasisKnowledgeList" class="k-list"></div>
                </div>

                <div class="k-section">
                    <div class="k-section-title">
                        SHORT-TERM <span class="badge" id="panelShortCount">0</span>
                    </div>
                    <div id="panelShortMemoryList" class="k-list"></div>
                </div>
            </div>
        </aside>

        <!-- Token Modal (Overlay) -->
        <div id="tokenModal" class="modal-backdrop">
            <div class="modal">
                <div class="modal-head">
                    <h3>Token Usage</h3>
                    <button id="closeModalBtn" class="btn-icon-small">✕</button>
                </div>
                <div class="modal-body">
                    <div class="stat-row">
                        <span>Total:</span> <span id="modalTotalTokens" class="mono">0</span>
                    </div>
                    <div class="stat-row">
                        <span>Today:</span> <span id="modalTodayTokens" class="mono">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/js/chat.js?v=20260204"></script>
    <style>
        /* Specific overrides */
        .knowledge-sidebar.visible { width: 300px; border-left: 1px solid #eee; }
        .knowledge-sidebar:not(.visible) { width: 0; border: none; overflow: hidden; }
        .modal-backdrop { display: none; }
        .modal-backdrop.active { display: flex; }
    </style>
    <div id="confirmBackdrop" class="modal-backdrop">
        <div class="modal">
            <div class="modal-head">
                <h3 id="confirmTitle">Confirm Action</h3>
            </div>
            <div class="modal-body">
                <p id="confirmMessage" style="margin-bottom: 20px; color: #666;">Are you sure?</p>
                <div style="display: flex; justify-content: flex-end; gap: 10px;">
                    <button class="btn-primary-outline" onclick="closeConfirmModal()" style="border:1px solid #ddd; color:#333;">Cancel</button>
                    <button id="confirmOkBtn" class="btn-primary-outline" style="border:1px solid #ff4d4f; color:#ff4d4f; background: #fff0f0;">Delete</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
