<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | WNetdisk</title>
  <style>
    body { font-family: "Microsoft JhengHei", Arial, sans-serif; background:#f0f0f1; margin:0; }
    .midbox { text-align:center; border:1px solid #c3c4c7; margin:100px auto 0; width:250px; height:300px; padding:30px; background:#fff; }
    .content { margin:30px 15px 0; text-align:left; }
    input { width:100%; height:35px; border-radius:5px; border:1px solid #8c8f94; margin-top:5px; font-size:16px; padding:8px; box-sizing:border-box; }
    .logbox { margin-top:20px; }
    .logbtn { width:70px; height:44px; background:#2271b1; color:#fff; font-size:16px; border:0; cursor:pointer; float:right; }
    .logbtn:hover { background:#135e96; }
    .msg { color:#c62828; min-height:20px; margin-top:8px; font-size:13px; }
  </style>
</head>
<body>
  <div class="midbox">
    <div class="content">
      <form id="loginForm">
        <span>Username:</span>
        <input id="username" type="text" name="username" autocomplete="username" />
        <br /><br />
        <span>Password:</span>
        <input id="password" type="password" name="password" autocomplete="current-password" />
        <div class="msg" id="msg"></div>
        <div class="logbox">
          <span class="loginbtn"><input type="submit" class="logbtn" value="登录" /></span>
        </div>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        msg.textContent = '用户名和密码不能为空';
        return;
      }

      try {
        const resp = await fetch('./api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await resp.json();
        if (!resp.ok || !data.success) {
          msg.textContent = data.message || '登录失败';
          return;
        }

        if (window.parent && typeof window.parent.hideLogin === 'function') {
          window.parent.hideLogin();
          if (typeof window.parent.getListDir === 'function') {
            window.parent.getListDir(window.parent.NowPath || './');
          }
        } else {
          window.location.href = './index.html';
        }
      } catch (err) {
        msg.textContent = '网络错误，请稍后重试';
      }
    });
  </script>
</body>
</html>
