<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NexoraLearning 学习看板</title>
  <link rel="stylesheet" href="/api/frontend/assets/app.css?v=20260514_14">
</head>
<body>
  <main class="learning-shell" id="learningPanel">
    <section id="dashboardView" class="view-pane is-active">
      <section class="workbench-grid">
        <article class="panel-card progress-panel">
          <header class="panel-head materials-head">
            <div class="panel-kicker-switch panel-kicker-switch-progress">
              <button id="dashboardProgressTabBtn" class="kicker-tab is-active" type="button">课程进度</button>
              <button id="dashboardProgressFeedTabBtn" class="kicker-tab" type="button">动态中心</button>
            </div>
            <select id="feedChannelSelect" class="input-lite feed-channel-select" hidden aria-label="选择频道"></select>
            <button id="openMaterialsViewBtn" class="nxl-icon-btn" type="button" aria-label="打开课程页" title="打开课程页">☰</button>
          </header>
          <div id="progressList" class="progress-list"></div>
          <div id="learningFeedPanel" class="feed-stream-panel" hidden></div>
          <button id="learningFeedComposeBtn" class="nxl-floating-feed-btn" type="button" aria-label="发布动态" title="发布动态" hidden>+</button>
        </article>

        <div class="side-column">
          <article class="panel-card pie-panel">
            <header class="panel-head materials-head">
              <p class="panel-kicker panel-kicker-zh">学习时长数据</p>
            </header>
            <div id="timePieChart" class="time-pie-chart" aria-label="学习时间占比"></div>
          </article>

          <article class="panel-card profile-panel">
            <section id="userProfileCard" class="user-profile-card" aria-label="用户资料"></section>
            <button id="profileAdminSettingsBtn" class="profile-admin-settings-icon" type="button" hidden aria-label="管理员设置" title="管理员设置">⚙</button>
          </article>
        </div>
      </section>
    </section>

    <section id="materialsView" class="view-pane">
      <article class="panel-card materials-panel">
        <header id="materialsMainHeader" class="panel-head materials-head">
          <div class="materials-head-left">
            <button id="backToDashboardBtn" class="nxl-icon-btn" type="button" aria-label="返回首页" title="返回首页">←</button>
            <p class="panel-kicker">COURSES</p>
          </div>
          <div class="materials-head-right">
            <button id="openUploadViewBtn" class="nxl-icon-btn nxl-icon-btn-dark" type="button" hidden aria-label="上传教材" title="上传教材">⤴</button>
          </div>
        </header>

        <section id="materialsLayout" class="materials-layout">
          <aside class="materials-list-pane">
            <div id="lectureList" class="materials-list"></div>
          </aside>
          <section id="lectureDetailPane" class="materials-detail-pane"></section>
        </section>

        <section id="readerPane" class="materials-reader-pane" hidden>
          <header id="readerHeader" class="panel-head materials-head reader-head reader-header">
            <div class="materials-head-left">
              <button id="backFromReaderBtn" class="nxl-icon-btn" type="button" aria-label="返回课程详情" title="返回课程详情">←</button>
              <div class="reader-head-text">
                <div id="readerTitle" class="reader-title">教材阅读</div>
                <div id="readerSubTitle" class="reader-subtitle">提取文本预览</div>
              </div>
            </div>
            <div class="reader-head-actions">
              <button id="readerChapterListBtn" class="nxl-icon-btn" type="button" aria-label="章节目录" title="章节目录">☰</button>
              <button id="readerSettingsBtn" class="nxl-icon-btn" type="button" aria-label="阅读设置" title="阅读设置">⚙</button>
            </div>
          </header>
          <section id="readerContent" class="reader-content">
            <div class="materials-empty">请选择教材后进入阅读</div>
          </section>
          <div id="readerClickAreas" class="reader-click-areas" hidden>
            <div id="readerClickLeft" class="reader-click-left"></div>
            <div id="readerClickRight" class="reader-click-right"></div>
          </div>
          <div class="reader-settings-panel" id="readerSettingsPanel" style="position:fixed;left:0;right:0;bottom:0;top:auto;transform:translateY(100%);visibility:hidden;pointer-events:none;z-index:10003;max-height:35dvh;overflow-y:auto;background:#fff;border-top:1px solid rgba(0,0,0,.12);border-radius:0;">
            <div class="settings-content">
              <div class="settings-section">
                <h6>显示模式</h6>
                <div class="display-mode-grid">
                  <input type="radio" class="btn-check" name="readerDisplayMode" id="displayModeBilingual" value="zh-ja" checked>
                  <label class="display-mode-btn" for="displayModeBilingual"><span>中日对照</span></label>
                  <input type="radio" class="btn-check" name="readerDisplayMode" id="displayModeReverseBilingual" value="ja-zh">
                  <label class="display-mode-btn" for="displayModeReverseBilingual"><span>日中对照</span></label>
                  <input type="radio" class="btn-check" name="readerDisplayMode" id="displayModeChineseOnly" value="zh">
                  <label class="display-mode-btn" for="displayModeChineseOnly"><span>仅中文</span></label>
                  <input type="radio" class="btn-check" name="readerDisplayMode" id="displayModeJapaneseOnly" value="ja">
                  <label class="display-mode-btn" for="displayModeJapaneseOnly"><span>仅日文</span></label>
                </div>
              </div>
              <div class="settings-section">
                <h6>主题</h6>
                <div class="theme-grid">
                  <input type="radio" class="btn-check" name="readerTheme" id="themeLight" value="light" checked>
                  <label class="theme-btn" for="themeLight"><div class="theme-preview light-preview"></div><span>浅色</span></label>
                  <input type="radio" class="btn-check" name="readerTheme" id="themeDark" value="dark">
                  <label class="theme-btn" for="themeDark"><div class="theme-preview dark-preview"></div><span>深色</span></label>
                  <input type="radio" class="btn-check" name="readerTheme" id="themeEyeCare" value="sepia">
                  <label class="theme-btn" for="themeEyeCare"><div class="theme-preview eyecare-preview"></div><span>护眼</span></label>
                </div>
              </div>
              <div class="settings-section">
                <h6>字体大小</h6>
                <div class="slider-container">
                  <div class="slider-label">
                    <span>小</span>
                    <span id="fontSizeValue">18px</span>
                    <span style="font-size: 1.2em;">大</span>
                  </div>
                  <input type="range" class="custom-range" id="fontSizeSlider" min="12" max="24" value="18">
                </div>
              </div>
              <div class="settings-section">
                <h6>段落距</h6>
                <div class="slider-container">
                  <div class="slider-label">
                    <span>紧密</span>
                    <span id="lineHeightValue">1.7</span>
                    <span>宽松</span>
                  </div>
                  <input type="range" class="custom-range" id="lineHeightSlider" min="1.0" max="3.5" step="0.1" value="1.7">
                </div>
              </div>
              <div class="settings-section">
                <h6>左右边距</h6>
                <div class="slider-container">
                  <div class="slider-label">
                    <span>窄</span>
                    <span id="edgeClickWidthValue">60px</span>
                    <span>宽</span>
                  </div>
                  <input type="range" class="custom-range" id="edgeClickWidthSlider" min="30" max="160" step="2" value="60">
                </div>
              </div>
              <div class="settings-section">
                <h6>其他设置</h6>
                <div class="setting-toggle">
                  <label class="toggle-label">
                    <input type="checkbox" id="enableKeyNavigation" checked>
                    <span class="toggle-slider"></span>
                    <span class="toggle-text">键盘导航</span>
                  </label>
                </div>
                <div class="setting-item mt-2">
                  <label for="translatorSelect" class="form-label small">翻译器</label>
                  <select class="form-select form-select-sm" id="translatorSelect">
                    <option value="auto">自动选择</option>
                    <option value="freeqwen">免费Qwen AI</option>
                    <option value="youdao">有道翻译</option>
                    <option value="baidu">百度翻译</option>
                  </select>
                </div>
              </div>
              <div class="settings-section">
                <div class="settings-actions">
                  <button class="btn btn-outline-danger btn-sm" id="resetReaderSettings" type="button">重置设置</button>
                  <button class="btn btn-outline-secondary btn-sm" id="exportReaderSettings" type="button">导出设置</button>
                </div>
              </div>
            </div>
          </div>
          <div class="chapter-list-panel" id="chapterListPanel">
            <div class="chapter-list-header">
              <h6>章节目录</h6>
              <button class="btn btn-sm btn-outline-secondary" id="closeChapterList" type="button">×</button>
            </div>
            <div class="chapter-list-content" id="chapterListContent">
              <div class="materials-empty">暂无目录</div>
            </div>
          </div>
        </section>
      </article>
    </section>

    <section id="uploadView" class="view-pane">
      <article class="panel-card upload-panel">
        <header class="panel-head materials-head">
          <div class="materials-head-left">
            <button id="backToMaterialsBtn" class="nxl-icon-btn" type="button" aria-label="返回课程页" title="返回课程页">←</button>
            <div class="panel-kicker panel-kicker-switch" role="tablist" aria-label="上传页切换">
              <button id="kickerCreateTabBtn" class="kicker-tab is-active" type="button" role="tab" aria-selected="true">新建课程</button>
              <button id="kickerUploadTabBtn" class="kicker-tab" type="button" role="tab" aria-selected="false">上传教材</button>
            </div>
          </div>
        </header>

        <section class="materials-upload-layout">
          <section class="materials-upload-left">
            <section id="createLectureBlock" class="upload-block">
              <div class="upload-block-title">新建课程</div>
              <div class="materials-form-row">
                <label class="materials-form-label" for="createLectureTitleInput">课程名</label>
                <input id="createLectureTitleInput" class="input-lite" placeholder="例如：机器学习导论">
              </div>
              <div class="materials-form-row">
                <label class="materials-form-label" for="createLectureCategoryInput">分类</label>
                <input id="createLectureCategoryInput" class="input-lite" placeholder="例如：AI / 前端 / 语言">
              </div>
              <div class="materials-form-row">
                <label class="materials-form-label" for="createLectureStatusSelect">状态</label>
                <select id="createLectureStatusSelect" class="input-lite">
                  <option value="draft">草稿</option>
                  <option value="active">进行中</option>
                  <option value="ready">已准备</option>
                  <option value="archived">归档</option>
                </select>
              </div>
              <div class="materials-form-row materials-form-row-textarea">
                <label class="materials-form-label" for="createLectureDescriptionInput">描述</label>
                <textarea id="createLectureDescriptionInput" class="input-lite input-textarea" placeholder="课程简介、目标、学习范围"></textarea>
              </div>
              <div class="materials-form-actions">
                <button id="createLectureBtn" class="nxl-icon-btn nxl-icon-btn-dark" type="button" aria-label="新建课程" title="新建课程">＋</button>
              </div>
            </section>

            <section id="uploadBookBlock" class="upload-block" hidden>
              <div class="upload-block-title">上传教材</div>
              <div class="materials-form-row">
                <label class="materials-form-label" for="materialsLectureInput">课程</label>
                <div class="course-picker-input-wrap">
                  <input id="materialsLectureInput" class="input-lite" placeholder="点击选择课程" readonly>
                  <input id="materialsLectureIdHidden" type="hidden">
                  <button id="openCoursePickerBtn" class="nxl-icon-btn" type="button" aria-label="选择课程" title="选择课程">⌕</button>
                </div>
              </div>
              <div class="materials-form-row">
                <label class="materials-form-label" for="materialsBookTitleInput">教材名</label>
                <input id="materialsBookTitleInput" class="input-lite" placeholder="例如：第 1 版教材">
              </div>
              <div class="materials-form-row materials-form-row-file">
                <label class="materials-form-label" for="materialsFileInput">文件</label>
                <input id="materialsFileInput" class="input-lite input-file" type="file" accept=".epub,.pdf,.txt,.md,.docx,.doc,.c,.h,.py,.rst">
              </div>
              <div class="materials-form-actions materials-form-actions-right">
                <button id="materialsUploadBookBtn" class="nxl-icon-btn nxl-icon-btn-dark" type="button" aria-label="确认上传" title="确认上传">⤴</button>
              </div>
              <p id="uploadTip" class="upload-tip">支持 EPUB、PDF、TXT、MD、DOCX、DOC、C、H、PY、RST</p>
            </section>
          </section>

          <section class="materials-upload-right">
            <header id="materialsPreviewHead" class="materials-preview-head">教材预览</header>
            <section id="materialsPreviewPane" class="materials-preview-pane">
              <div class="materials-empty">请选择教材文件后预览</div>
            </section>
          </section>
        </section>
      </article>
    </section>

    <section id="settingsView" class="view-pane">
      <article class="panel-card settings-panel">
        <header class="panel-head materials-head">
          <div class="materials-head-left">
            <button id="backFromSettingsBtn" class="nxl-icon-btn" type="button" aria-label="返回首页" title="返回首页">←</button>
            <p class="panel-kicker">SETTINGS</p>
          </div>
        </header>
        <section class="settings-layout">
          <aside class="settings-nav-pane">
            <div id="settingsNavList" class="settings-nav-list"></div>
          </aside>
          <section id="settingsDetailPane" class="settings-detail-pane"></section>
        </section>
      </article>
    </section>
  </main>
  <div id="confirmBackdrop" class="modal-backdrop" style="display:none;">
    <div class="modal modal-sm" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <div class="modal-head">
        <h3 id="confirmTitle">学习确认</h3>
      </div>
      <div id="confirmBody" class="modal-body modal-body-center">是否退出学习</div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" id="confirmOkBtn">是</button>
        <button type="button" class="btn btn-secondary" id="confirmCancelBtn">否</button>
      </div>
    </div>
  </div>
  <script src="/api/frontend/assets/app.js?v=20260514_14"></script>
</body>
</html>
