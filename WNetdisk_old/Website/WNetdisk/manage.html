<html>
<head>
    <title>WNetdisk - 管理面板</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="./css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./faw/css/font-awesome.min.css">
    <script src="./js/wajax.js"></script>
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .navbar { margin-bottom: 20px;     border-radius: 9px;}
        .main-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);

            overflow-y: scroll;
        }
        .file-list {
            height: calc(100vh - 250px);
            overflow-y: auto;
        }
        .file-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .file-item:hover { background-color: #f8f9fa; }
        .file-icon { margin-right: 10px; }
        .breadcrumb {
            background-color: #f8f9fa;
            padding: 8px 16px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .role-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .role-normal { background: #e9ecef; color: #495057; }
        .role-vip { background: #fff3cd; color: #856404; }
        .role-admin { background: #2b9516; color: #ffffff; }
        .action-buttons {
            display: flex;
            gap: 5px;
            min-width: 380px;
        }
        .action-buttons .btn {
            flex: 1;
            white-space: nowrap;
            padding: 0.25rem 0.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fa fa-shield"></i> WNetdisk 管理面板</a>
            <div class="navbar-nav ms-auto">
                <a href="./index.html" class="btn btn-light">
                    <i class="fa fa-cloud"></i> 返回网盘
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3">
                <div class="main-container">
                    <h5>用户管理</h5>
                    <div class="list-group">
                        <a href="#" class="list-group-item list-group-item-action" onclick="showUserList()">
                            <i class="fa fa-users"></i> 用户列表
                        </a>
                        <a href="#" class="list-group-item list-group-item-action" onclick="showCreateUser()">
                            <i class="fa fa-user-plus"></i> 创建用户
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="main-container" id="mainContent"></div>
            </div>
        </div>
    </div>

    <script>
        let currentPath = './';
        let currentUser = '';

        function showUserList() {
            newCallback(function(response, xhr) {
                if (xhr.status !== 200 || xhr.readyState !== 4) {
                    return;
                }
                const data = JSON.parse(response);
                let html = `
                    <h4>用户列表</h4>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>用户名</th>
                                <th>权限</th>
                                <th style="min-width:300px">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                for(let username in data) {
                    const role = data[username].role || 'normal';
                    const roleClass = `role-${role}`;
                    html += `
                        <tr>
                            <td>${username}</td>
                            <td><span class="role-badge ${roleClass}">${role}</span></td>
                            <td>
                                <div class="action-buttons">
                                    <button class="btn btn-sm btn-primary" onclick="viewUserFiles('${username}')">
                                        <i class="fa fa-folder-open"></i> 查看文件
                                    </button>
                                    <button class="btn btn-sm btn-warning" onclick="showChangePassword('${username}')">
                                        <i class="fa fa-key"></i> 修改密码
                                    </button>
                                    <button class="btn btn-sm btn-info" onclick="showChangeRole('${username}', '${role}')">
                                        <i class="fa fa-user-circle"></i> 修改权限
                                    </button>
                                    <button class="btn btn-sm btn-danger" onclick="confirmDeleteUser('${username}')">
                                        <i class="fa fa-trash"></i> 删除用户
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                }
                
                html += `</tbody></table>`;
                document.getElementById('mainContent').innerHTML = html;
            }, './api/manageuser.py?type=alluser');
        }

        function showCreateUser() {
            let html = `
                <h4>创建新用户</h4>
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" id="newUsername">
                </div>
                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" id="newPassword">
                </div>
                <button class="btn btn-primary" onclick="createUser()">
                    <i class="fa fa-plus"></i> 创建用户
                </button>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        function confirmDeleteUser(username) {
            if(confirm(`确定要删除用户 "${username}" 吗？此操作不可恢复！`)) {
                deleteUser(username);
            }
        }

        function deleteUser(username) {
            newCallback(function(response, xhr) {
                if (xhr.readyState !== 4 || xhr.status !== 200) {
                    return;
                }
                alert(response);
                showUserList();
            }, `./api/manageuser.py?type=deleteuser&user=${username}`);
        }

        function createUser() {
            const username = document.getElementById('newUsername').value;
            const password = document.getElementById('newPassword').value;
            
            if(!username || !password) {
                alert('用户名和密码不能为空');
                return;
            }
            
            newCallback(function(response, xhr) {
                if (xhr.readyState !== 4 || xhr.status !== 200) {
                    return;
                }
                alert(response);
                showUserList();
            }, `./api/manageuser.py?user=${username}&pwd=${password}&type=create`);
        }

        function showChangePassword(username) {
            let html = `
                <h4>修改密码 - ${username}</h4>
                <div class="mb-3">
                    <label class="form-label">新密码</label>
                    <input type="password" class="form-control" id="newPwd">
                </div>
                <button class="btn btn-primary" onclick="changePassword('${username}')">
                    <i class="fa fa-save"></i> 保存修改
                </button>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        function changePassword(username) {
            const newPassword = document.getElementById('newPwd').value;
            if(!newPassword) {
                alert('密码不能为空');
                return;
            }
            
            newCallback(function(response, xhr) {
                if (!xhr.readyState == 4 || xhr.status !== 200) {
                    return;
                }
                alert(response);
                showUserList();
            }, `./api/manageuser.py?user=${username}&pwd=${newPassword}&type=changepwd`);
        }

        function showChangeRole(username, currentRole) {
            let html = `
                <h4>修改用户权限 - ${username}</h4>
                <div class="mb-3">
                    <label class="form-label">权限级别</label>
                    <select class="form-select" id="newRole">
                        <option value="normal" ${currentRole === 'normal' ? 'selected' : ''}>普通用户</option>
                        <option value="vip" ${currentRole === 'vip' ? 'selected' : ''}>VIP用户</option>
                        <option value="admin" ${currentRole === 'admin' ? 'selected' : ''}>管理员</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="changeRole('${username}')">
                    <i class="fa fa-save"></i> 保存修改
                </button>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        function changeRole(username) {
            const newRole = document.getElementById('newRole').value;
            newCallback(function(response, xhr) {
                if (xhr.readyState !== 4 || xhr.status !== 200) {
                    return;
                }
                alert(response);
                showUserList();
            }, `./api/manageuser.py?user=${username}&role=${newRole}`);
        }

        function viewUserFiles(username, path = './') {
            currentUser = username;
            currentPath = path;
            
            newCallback(function(response, xhr) {
                if (xhr.status !== 200 || xhr.readyState !== 4) {
                    return;
                }
                const data = JSON.parse(response);
                
                let html = `
                    <h4>${username}的文件</h4>
                    <button class="btn btn-success mb-3" onclick="showUploadDialog('${username}', '${path}')">
                        <i class="fa fa-upload"></i> 上传文件
                    </button>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item">
                                <a href="#" onclick="viewUserFiles('${username}')">根目录</a>
                            </li>`;

                if(path !== './') {
                    const pathParts = path.split('/').filter(p => p);
                    let currentPath = './';
                    pathParts.forEach((part, index) => {
                        if (part == ".") return;
                        currentPath += part + '/';
                        html += `
                            <li class="breadcrumb-item">
                                ${index === pathParts.length - 1 ? 
                                    part : 
                                    `<a href="#" onclick="viewUserFiles('${username}', '${currentPath}')">${part}</a>`
                                }
                            </li>`;
                    });
                }

                html += `
                        </ol>
                    </nav>
                    <div class="file-list">`;

                if(path !== './') {
                    html += `
                        <div class="file-item" onclick="handleBackClick()">
                            <i class="fa fa-arrow-up file-icon"></i>
                            返回上级目录
                        </div>`;
                }
                
                for(let key in data) {
                    const item = data[key];
                    const icon = item.type ? 'fa-file' : 'fa-folder';
                    
                    html += `
                        <div class="file-item" onclick="handleFileClick('${item.name}', ${item.type})">
                            <i class="fa ${icon} file-icon"></i>
                            ${item.name}
                            ${item.type ? `
                                <a href="./api/download.py?user=${username}&filepath=${path}${encodeURIComponent(item.name)}" 
                                   class="btn btn-sm btn-primary ms-2">
                                    <i class="fa fa-download"></i> 下载
                                </a>` : ''}
                        </div>`;
                }
                
                html += `</div>`;
                document.getElementById('mainContent').innerHTML = html;
            }, `./api/getlistdir.py?user=${username}&dir=${path}`);
        }
        function showUploadDialog(username, path) {
            let html = `
                <div class="modal-content p-4">
                    <h4>上传文件到 ${username} 的目录</h4>
                    <div class="mb-3">
                        <label class="form-label">选择文件</label>
                        <input type="file" class="form-control" id="fileInput">
                    </div>
                    <div class="progress mb-3" style="display:none">
                        <div class="progress-bar" role="progressbar" style="width: 0%"></div>
                    </div>
                    <button class="btn btn-primary" onclick="uploadFile('${username}', '${path}')">
                        <i class="fa fa-upload"></i> 开始上传
                    </button>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        function uploadFile(username, path) {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files[0]) {
                alert('请选择文件');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const xhr = new XMLHttpRequest();
            const progressBar = document.querySelector('.progress');
            const progressBarInner = document.querySelector('.progress-bar');
            
            progressBar.style.display = 'block';
            
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percent = (e.loaded / e.total) * 100;
                    progressBarInner.style.width = percent + '%';
                    progressBarInner.textContent = Math.round(percent) + '%';
                }
            });

            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        alert('上传成功');
                        viewUserFiles(username, path);
                    } else {
                        alert('上传失败: ' + xhr.responseText);
                    }
                }
            };

            xhr.open('POST', `./api/updatefile.py?username=${username}&path=${path}`, true);
            xhr.send(formData);
        }

        function handleFileClick(filename, isFile) {
            if(!isFile) {
                const newPath = currentPath + filename + '/';
                viewUserFiles(currentUser, newPath);
            }
        }

        function handleBackClick() {
            const pathParts = currentPath.split('/').filter(p => p);
            pathParts.pop();
            const newPath = pathParts.length ? './' + pathParts.join('/') + '/' : './';
            viewUserFiles(currentUser, newPath);
        }

        window.onload = showUserList;
    </script>
</body>
</html>
