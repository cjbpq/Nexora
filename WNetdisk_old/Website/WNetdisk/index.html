    var collide = function(rect1,rect2) {
        var maxX,maxY,minX,minY

        maxX = rect1.x+rect1.width >= rect2.x+rect2.width ? rect1.x+rect1.width : rect2.x+rect2.width
        maxY = rect1.y+rect1.height >= rect2.y+rect2.height ? rect1.y+rect1.height : rect2.y+rect2.height
        minX = rect1.x <= rect2.x ? rect1.x : rect2.x
        minY = rect1.y <= rect2.y ? rect1.y : rect2.y

        if(maxX - minX <= rect1.width+rect2.width && maxY - minY <= rect1.height+rect2.height){
          return true
        }else{
          return false
        }
      }

    window.onload = function() {
        var areaclick = document.getElementById('contarea');
        var menu      = document.getElementById('rightclickmenu');

        isShowingRM = false;

        function showMenu(evt) {
            var evt        = evt ? evt : (window.event || arguments[0]);
            var rightedge  = areaclick.clientWidth-evt.clientX;
            var bottomedge = areaclick.clientHeight-evt.clientY;
            if((evt.clientX > menu.offsetLeft && evt.clientX < menu.offsetLeft + menu.clientWidth) && (evt.clientY > menu.offsetTop && evt.clientY < menu.offsetTop + menu.clientHeight)){
                return;
            }
            if(isShowingRM && !stopAnycontrol){
                hideMenu();
                isShowingRM = false;
                window.evt = evt;
                setTimeout("window.showMenu(window.evt);", 200);
                return;
            }
            if(!stopAnycontrol){
                if (rightedge < menu.offsetWidth)
                    menu.style.left = areaclick.scrollLeft + evt.clientX - menu.offsetWidth + "px";
                else
                    menu.style.left = areaclick.scrollLeft + evt.clientX + "px";
                if (bottomedge < menu.offsetHeight)
                    menu.style.top = areaclick.scrollTop + document.body.scrollTop + evt.clientY - menu.offsetHeight + "px";
                else
                    menu.style.top = areaclick.scrollTop + document.body.scrollTop + evt.clientY + "px";
                menu.style.opacity = '1';
                menu.style.zIndex = '100';
                LTEvent.addListener(menu,"rightclickmenu",LTEvent.cancelBubble);
                isShowingRM = true;
            }
        }
        function hideMenu() {
            var evt = window.event || arguments[0];
            
            if((!event || event.type == "click" || event.type == "contextmenu") && !stopAnycontrol){
                if(isShowingRM){
                    menu.style.opacity = '0';
                    setTimeout("document.getElementById('rightclickmenu').style.left = '-999999';document.getElementById('rightclickmenu').style.top ='-999999';", 100);
                    menu.style.zIndex = '-999999';
                    isShowingRM = false;
                }
            }
            if(evt.clientX < document.body.clientWidth*0.7 & isShowingRL & !stopAnycontrol){
                if(evt.clientY < document.body.clientHeight - 60)
                    showRightlist();
            }
            //console.log("HIDE1", event, event.type )

            //(evt.clientY < menu.offsetTop || evt.clientY > menu.offsetHeight + menu.offsetTop))
            if(!stopAnycontrol){
                //console.log('(',evt.clientX , evt.clientY ,')');
                if((evt.clientX > menu.offsetLeft || evt.clientX < menu.offsetWidth + menu.offsetLeft) && 
                    (evt.clientY < menu.offsetTop || evt.clientY > menu.offsetHeight + menu.offsetTop)){

                        for(i=0;ele.length>i;i++){

                            elePosY = e.offsetTop

                            edgeY   = elePosY + e.clientHeight
                            isInX   = evt.clientX > elePosX && evt.clientX < edgeX
                            isInY   = evt.clientY + document.body.scrollTop > elePosY && evt.clientY + document.body.scrollTop < edgeY
                            if(isInX == false || isInY == false){
                                e.classList.contains("selectfile")?e.classList.remove("selectfile"):0;
                                //console.log("------------>",e.getElementsByClassName("filename")[0].innerHTML)
                            }else{
                                //console.log("ElementPos:("+elePosX+","+elePosY+")\nEdge:("+edgeX+","+edgeY+")")
                            }
                            //console.log(e.getElementsByClassName("filename")[0].innerHTML, isInX, isInY)
                        }
                    }
                }
            //hideTip();
        }

        LTEvent.addListener(areaclick, "contextmenu", LTEvent.cancelBubble);
        LTEvent.addListener(areaclick, "contextmenu", showMenu);
        LTEvent.addListener(menu, "contextmenu", showMenu);
        LTEvent.addListener(menu, "contentmenu", LTEvent.cancelBubble)

            LTEvent.addListener(elem, "contextmenu", x)
        }*/

        const WindowManager = {
            baseZIndex: 50,
            windows: new Set(),

            
            reorderWindows(activeWindow) { // 重新渲染排序所有窗口的z-index
                const windows = Array.from(this.windows);
                windows.sort((a, b) => a.window.style.zIndex - b.window.style.zIndex);
                
                windows.forEach((win, index) => {
                    if(win !== activeWindow) {
                        // 重置优先级
                        win.window.style.zIndex = this.baseZIndex + index;
                    }
                });
                
                if(activeWindow) {
                    // 将激活窗口置顶
                    activeWindow.window.style.zIndex = this.baseZIndex + windows.length;
                }
                document.getElementById("rightclickmenu").style.zIndex = this.baseZIndex + windows.length + 1;

        };

        class Window {
            constructor (h, w, title) {
                this.height = h;

                if (w >= window.screen.width) {
                    w = window.screen.width - 100;

                WindowList[this.ID] = this;

                this.window = document.createElement("div");

                this.titlebar = document.createElement("div");
                this.titlebar.className = "titlebar";
                this.titlebar.innerHTML = "<span class='title'>"+title+"</span>";

                this.window.style.width = w;
                this.window.style.height = h;

                this.toolbar = document.createElement("span");
                this.toolbar.style.position = 'absolute';
                this.toolbar.style.right = '0';
                this.toolbar.style.paddingRight = '10px';
                this.toolbar.innerHTML = '<span class="block"><div class="maxminwindowIcon"></div></span><span class="block" onclick="closeWindowByID(\''+this.ID+'\')"><div class="cross"></div></span>';

                // -- 注册事件
                WindowManager.windows.add(this);
                const handleActivation = () => {
                    WindowManager.reorderWindows(this);
                };
                this.window.addEventListener("mousedown", handleActivation);
                this.window.addEventListener("touchstart", handleActivation);

                this.resizer = document.createElement("div");
                this.resizer.className = "window-resizer";
                
                // 绑定拉伸事件ss
                this.bindResizeEvents();
                this.events = {
                    "onclose": (t) => {},
                    "init": (t) => {},
                };
            }
            bindResizeEvents() {
                let isResizing = false;
                let startX, startY, startWidth, startHeight;

                this.resizer.addEventListener('mousedown', (e) => {
                    isResizing = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    startWidth = parseInt(this.window.style.width);
                    startHeight = parseInt(this.window.style.height);
                    
                    e.preventDefault();
                    e.stopPropagation();
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isResizing) return;

                    const width = startWidth + (e.clientX - startX);
                    const height = startHeight + (e.clientY - startY);
                    
                    // 设置最小尺寸
                    if (width >= 200 && height >= 100) {
                        this.window.style.width = width + 'px';
                        this.window.style.height = height + 'px';
                    }
                });

                document.addEventListener('mouseup', () => {
                    isResizing = false;
                });
            }
        
            setWidth (width) {
                this.window.style.width = width+"px";
            }
            setHeight (height) {
                this.window.style.height = height+"px";
            }
            show (posX, posY, innerHTML="") {
                if(document.getElementById("anycontent").children[this.window.id]){
                    this.window.style.display = 'block';
                    return;
                }
                this.window.appendChild(this.titlebar);
                this.titlebar.appendChild(this.toolbar);
                this.window.appendChild(this.resizer);
                if (innerHTML !== "") this.window.innerHTML += innerHTML;
                this.window.style.display = 'block';
                this.window.style.top = posX+"px";
                this.window.style.left = posY+"px";
                document.getElementById("anycontent").appendChild(this.window);
                
            }

            setCallback (event, callback) {
                this.events[event] = callback;
            }

            close () {
                WindowManager.windows.delete(this);
                this.window.style.display = 'none';
                this.events['onclose'](this);
            }
        }


        function inWindow(x, y, win = null, onlyTitle = false) {
            let scroll = document.documentElement.scrollTop || document.body.scrollTop;
            
            if (win === null) {
                // 如果 win 为 null，遍历所有窗口
                let windows = document.getElementsByClassName("window");
                
                for (let element of windows) {
                    // 计算元素边界
                    let rect = element.getBoundingClientRect();
                    let top = rect.y;
                    let left = rect.left;
                    let bottom = top + (onlyTitle ? element.firstChild.offsetHeight : element.offsetHeight);
                    let right = left + rect.width;
                    console.error(rect.x, rect.y, x, y, scroll, rect.width, rect.height);
                    // 检查鼠标是否在当前窗口范围内
                    if (x >= left && x <= right && y >= top && y <= bottom) {
                        return element;  // 返回匹配的元素
                    }
                }
                
                return false;  // 如果没有匹配的窗口，返回 false
            } else {
                // 如果提供了具体的窗口元素，检查鼠标是否在这个窗口内

                let rect = win.getBoundingClientRect();
                let top = rect.top + scroll;
                let left = rect.left;
                let bottom = top + (onlyTitle ? win.firstChild.offsetHeight : win.offsetHeight);
                let right = left + rect.width;

                return x >= left && x <= right && y >= top && y <= bottom;
            }
        }

        function zoomImage(imageId, factor) {
            const img = document.getElementById(imageId);
            const imageWindow = WindowList[parseInt(imageId.substring(imageId.length-7, imageId.length))];

            const currentScale = img.style.transform ? 
                parseFloat(img.style.transform.match(/scale\(([^)]+)\)/)[1]) : 1;
            const newScale = currentScale * factor;
            
            if(newScale >= 0.1 && newScale <= 5) {
                img.style.transform = `scale(${newScale})`;
            }
        }

        function refreshMusicPicture() {
            let eles = document.getElementsByClassName("file");
            for(let i=0; i<eles.length; i++) {
                let e = eles[i];
                let name = e.getElementsByClassName("filename")[0].textContent;
                if(name.match(/\.(m4a|mp3|wav)$/)) {
                    if(e.getAttribute("file-type") == 'true') {
                        let fullPath = NowPath + name;
                        if(CACHE_MUSICCOVER[fullPath]) {
                            e.style.backgroundImage = CACHE_MUSICCOVER[fullPath] === 114514 ? 
                                "url(./music.png)" : 
                                "url(" + CACHE_MUSICCOVER[fullPath] + ")";
                            e.style.backgroundSize = '83% 83%';
                            e.style.backgroundPosition = '10 10';
                            continue;
                        }
                        
                        newCallback(function(resText, xmlhttp, ppp) {
                            if(xmlhttp.readyState == 4 && xmlhttp.status == 200) {
                                if(resText.substring(0, 4) == 'data') {
                                    ppp[0].style.backgroundImage = "url(" + resText + ")";
                                    ppp[0].style.backgroundSize = '83% 83%';
                                    ppp[0].style.backgroundPosition = '10 10';
                                    CACHE_MUSICCOVER[NowPath + ppp[1]] = resText;
                                }
                            } else {
                                ppp[0].style.backgroundImage = 'url(./music.png)';
                                CACHE_MUSICCOVER[NowPath + ppp[1]] = 114514;
                            }
                        }, "./api/getmusiccover.py?filepath=" + encodeURIComponent(fullPath), [e, name], undefined, true);
                    }
                }
            }
        }

                return;

            copyFiles = [];

        function cut() {
            let selectedFiles = document.getElementsByClassName("selectfile");
            if (selectedFiles.length == 0) {
                showTip("请先选择文件。");
                return;
            }
            copyFiles = [];
            for (let i = 0; i < selectedFiles.length; i++) {
                copyFiles.push(NowPath+selectedFiles[i].getElementsByClassName("filename")[0].textContent);
            }
            isCutting = true;

        function paste() {
            if (copyFiles.length == 0) {
                showTip("请先复制文件。");
                return;
            }

            let destDir = NowPath;
            let pastedFiles = 0;

            for (let i = 0; i < copyFiles.length; i++) {
                let filename = copyFiles[i].split("/").pop();
                let newFilename = filename;
                let j = 1;
                
                // 防止重名
                if (copyFiles[i] == NowPath + newFilename) {
                    while (copyFiles.includes(NowPath + newFilename)) {
                        newFilename = filename + " (" + j + ")";
                        j++;
                    }
                }

                newCallback(function(res, xhr) {
                    if(xhr.readyState == 4 && xhr.status == 200) {
                        pastedFiles++;
                        if(pastedFiles == copyFiles.length) {
                            showTip("所有文件已粘贴到: <strong>" + destDir + "</strong><br>" + xhr.responseText);
                            openIn("");
                            if(isCutting) {
                                copyFiles = [];
                                isCutting = false;
                            }
                        }
                    }
                }, "./api/moveFile.py?src=" + encodeURIComponent(copyFiles[i]) + 
                "&dest=" + encodeURIComponent(destDir + newFilename) + 
                "&cut=" + isCutting);
            }
        }

                SchedLine.value = NowWidth;

            document.getElementById("play").getElementsByTagName("i")[0].className = iconName;
        }

        var playOrPauseMusic = function(){
            scrolling = false;
            stopall = true;
            setTimeout(() => {
                if(WPObject.isPaused()){
                    WPObject.play();
                    scrolling = true;
                    stopall = false;
                    musicNameWidth = span.offsetWidth;
                    wrapperWidth = musicNameWrapper.offsetWidth;
                    position = musicNameWrapper.offsetWidth;

                    scrollMusicName();
                    changeMusicIcon('fa fa-pause fa-fw fa-2x');
                }else{
                    WPObject.pause();
                    scrolling = false;
                    stopall = true;
                    changeMusicIcon('fa fa-play fa-fw fa-2x');
                }
            }, 20);
        }

        var changePos = function(){
            val = SchedLine.value;
            percent = (val / 1000).toFixed(2);
            //console.log(val, percent)
            WPObject.setPos((percent*WPObject.getDuration()).toFixed(1));
        }
        
        SchedLine.onmousedown = function(){
            stopAnycontrol = true;
            stopRefreshPos = true;
        }
        
        SchedLine.onmouseup = function(){
            stopAnycontrol = false;
            stopRefreshPos = false;
        }

        SchedLine.oninput = function(){
            changePos();
        }

        musicName = document.getElementById('musicN');
        span = musicName.querySelector('span') || musicName; // 若没有包裹在span内，直接使用musicName

        scrolling = false;
        stopall = false;
        var position = 0;

        musicNameWidth = span.offsetWidth;
        wrapperWidth = musicNameWrapper.offsetWidth;
        
        function scrollMusicName(av) { // 动画滚动函数
            if (!scrolling && !av) return; 
            if (stopall) return;

            position -= 0.5;  // 每次滚动的像素值
            if (position <= -musicNameWidth) {
                position = wrapperWidth;
            }
            
            musicName.style.transform = `translateX(${position}px)`;  // 更新位置
        }
