<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WNetdisk Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft Jhenghei", "Segoe UI", "Arial", sans-serif;
            background: #ffffff;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* 头部图片区域 - 完全融合白色背景 */
        .hero-section {
            text-align: center;
            padding: 60px 0 40px 0;
            background: #ffffff;
        }
        
        .hero-image {
            max-width: 100%;
            width: 80%;
            height: auto;
            filter: drop-shadow(0 8px 25px rgba(0, 0, 0, 0.08));
            transition: transform 0.3s ease;
        }
        
        .hero-image:hover {
            transform: scale(1.01);
        }
        
        /* 标题区域 - 简洁灰色 */
        .title-section {
            padding: 30px 0 40px 0;
            text-align: center;
            background: #ffffff;
        }
        
        .main-title {
            font-size: 1.8rem;
            font-weight: 500;
            color: #555;
            letter-spacing: 0.5px;
        }
        
        .main-title a {
            color: #666;
            text-decoration: none;
            border-bottom: 1px solid #ddd;
            transition: all 0.3s ease;
        }
        
        .main-title a:hover {
            color: #333;
            border-bottom-color: #333;
        }
        
        /* 更新日志区域 */
        .update-section {
            padding: 40px 0;
            background: #fafafa;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .update-content {
            max-width: 750px;
            margin: 0 auto;
            font-size: 1rem;
            line-height: 1.7;
            color: #666;
            padding: 0 30px;
        }
        
        .version-tag {
            background: #f8f8f8;
            color: #666;
            padding: 3px 12px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-right: 8px;
            border: 1px solid #e0e0e0;
        }
        
        /* 导航区域 */
        .navigation-section {
            padding: 50px 0 60px 0;
            background: #ffffff;
        }
        
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 700px;
            margin: 0 auto;
        }
        
        .nav-item {
            background: #ffffff;
            border: 1px solid #e8e8e8;
            padding: 25px 20px;
            text-align: center;
            text-decoration: none;
            color: #555;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            border-radius: 5px;
        }
        
        .nav-item:hover {
            color: #333;
            border-color: #ccc;
            background: #fafafa;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }
        
        /* 简洁分隔线 */
        .divider {
            height: 1px;
            background: #f0f0f0;
            margin: 30px auto;
            max-width: 400px;
        }
        
        /* 页脚 */
        .footer {
            padding: 30px 0;
            text-align: center;
            background: #fafafa;
            color: #999;
            font-size: 0.9rem;
            border-top: 1px solid #f0f0f0;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .hero-section {
                padding: 40px 0 30px 0;
            }
            
            .hero-image {
                width: 90%;
            }
            
            .main-title {
                font-size: 1.4rem;
                padding: 0 20px;
            }
            
            .update-content {
                padding: 0 20px;
                font-size: 0.95rem;
            }
            
            .nav-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
                padding: 0 20px;
            }
            
            .nav-item {
                padding: 20px 15px;
                font-size: 1rem;
            }
        }
        
        @media (max-width: 480px) {
            .nav-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* 轻微动画效果 */
        .fade-in {
            animation: fadeIn 0.8s ease-in-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- 头部图片区域 -->
    <section class="hero-section">
        <div class="container">
            <img src="./PyWebServer.png" alt="PyWebServer" class="hero-image fade-in">
        </div>
    </section>
    
    <!-- 标题区域 -->
    <section class="title-section">
        <div class="container">
            <h2 class="main-title fade-in">
                由 <a href="https://github.com/Himpq/PyWebServer">PyWebServer</a> 项目创建的 web 服务器
            </h2>
        </div>
    </section>
    
    <!-- 更新日志区域 -->
    <section class="update-section">
        <div class="container">
            <div class="update-content fade-in">
                <p>
                    更新日志：<span class="version-tag">v8.1</span>修复了HTTP/1.1的长连接响应问题，统一了文件命名方式。<br>
                    更新了导入模块的方式，现在使用 "include" 方法导入模块默认为导入一个集合而非变量的方式。<br>
                    新增魔术导入的方式。<br>
                    <strong>2023-7-18 00:38</strong>
                </p>
            </div>
        </div>
    </section>
    
    <!-- 导航区域 -->
    <section class="navigation-section">
        <div class="container">
            <div class="nav-grid">
                <a href="javascript:void(0)" onclick="location.href='https://himpqblog.cn'" class="nav-item fade-in">
                    Author's blog
                </a>
                
                <a href="./WNetdisk/" class="nav-item fade-in">
                    WNetdisk
                </a>
                
                <a href="./ainovel/" class="nav-item fade-in">
                    NovelTranslator
                </a>
                
                <a href="./pwsdoc/" class="nav-item fade-in">
                    PWS Docs
                </a>
            </div>
        </div>
    </section>
    
    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>Powered by PyWebServer | 2023 © Himpq</p>
        </div>
    </footer>
    
    <script>
        // 原有的跳转函数
        function j() {
            location.href = 'https://himpqblog.cn';
        }
        
        // 页面加载动画
        document.addEventListener('DOMContentLoaded', function() {
            const elements = document.querySelectorAll('.fade-in');
            elements.forEach((element, index) => {
                element.style.animationDelay = `${index * 0.15}s`;
            });
        });
    </script>
</body>
</html>
